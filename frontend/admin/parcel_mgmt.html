<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pick N Go - Parcel Management</title>
    <link rel="stylesheet" href="../styles.css">
</head>

<body>
    <div class="admin-wrapper">
        <nav class="sidebar">
            <!-- Sidebar content loaded dynamically by admin_app.js -->
        </nav>

        <main class="admin-content">
            <header class="admin-header">
                <h1>PICK N GO</h1>
                <div class="admin-links">
                    <a href="#">PROFILE</a>
                    <a href="#">ADMIN</a>
                    <a href="../index.html">LOGOUT</a>
                </div>
            </header>

            <section>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h2>PARCEL MANAGEMENT</h2>
                    <button class="btn" style="width: auto; padding: 10px 20px; margin-top: 0;"
                        onclick="showAddModal()">ADD PARCEL</button>
                </div>
                
                <table class="data-table" style="width: 100%; border-collapse: collapse; margin-top: 20px; text-align: left;">
                    <thead>
                        <tr>
                            <th style="padding: 10px; border-bottom: 1px solid #444;">Request ID</th>
                            <th style="padding: 10px; border-bottom: 1px solid #444;">Student ID</th>
                            <th style="padding: 10px; border-bottom: 1px solid #444;">Parcel ID</th>
                            <th style="padding: 10px; border-bottom: 1px solid #444;">Locker ID</th>
                            <th style="padding: 10px; border-bottom: 1px solid #444;">PIN</th>
                            <th style="padding: 10px; border-bottom: 1px solid #444;">Date</th>
                            <th style="padding: 10px; border-bottom: 1px solid #444;">Status</th>
                            <th style="padding: 10px; border-bottom: 1px solid #444;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="parcelTableBody">
                        <!-- Loaded dynamically -->
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <!-- Add Parcel Modal (Fig 25) -->
    <div class="modal-overlay" id="addModal">
        <div class="modal-box">
            <h3>ADD PARCEL</h3>
            <div class="form-group">
                <label>Locker ID :</label>
                <input type="text" id="modalLockerId">
            </div>
            <div class="form-group">
                <label>Parcel ID :</label>
                <input type="text" id="modalParcelId">
            </div>
            <div class="form-group">
                <label>Student ID :</label>
                <input type="text" id="modalStudentId">
            </div>
            <div class="form-group">
                <label>Status :</label>
                <input type="text" id="modalStatus">
            </div>
            <div class="form-group">
                <label>Action :</label>
                <input type="text" id="modalAction" placeholder="e.g. Store">
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="saveParcel()">ADD</button>
                <button class="btn btn-secondary" onclick="hideAddModal()">CANCEL</button>
            </div>
        </div>
    </div>

    <script src="admin_app.js?v=2"></script>
</body>

</html>
