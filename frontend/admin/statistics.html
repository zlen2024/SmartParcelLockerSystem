<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pick N Go - Statistics & Records</title>
    <link rel="stylesheet" href="../styles.css">
    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 30px;
        }
        .chart-container {
            background: #222;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #333;
        }
        .chart-container h3 {
            text-align: center;
            margin-bottom: 20px;
            color: #4CAF50;
        }
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="admin-page">
    <div class="admin-wrapper">
        <nav class="sidebar">
            <!-- Sidebar content loaded dynamically by admin_app.js -->
        </nav>

        <main class="admin-content">
            <header class="admin-header">
                <h1>STATISTICS & RECORDS</h1>
                <div class="admin-links">
                    <!-- Loaded by admin_app.js -->
                </div>
            </header>

            <section>
                <h2>SYSTEM USAGE ANALYTICS</h2>
                <div class="stats-grid">
                    <div class="chart-container">
                        <h3>Most Frequently Used Locker</h3>
                        <canvas id="lockerUsageChart"></canvas>
                    </div>
                    <div class="chart-container">
                        <h3>Busiest Peak Days of the Week</h3>
                        <canvas id="peakDaysChart"></canvas>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="admin_app.js?v=7"></script>
    <script>
        async function loadStatistics() {
            try {
                const response = await fetch(`${API_BASE}/admin/statistics`);
                const data = await response.json();
                
                // 1. Render Locker Usage Chart (Bar Chart)
                const ctxLocker = document.getElementById('lockerUsageChart').getContext('2d');
                const lockerLabels = data.locker_usage.map(item => `Locker ${item.lockerID}`);
                const lockerData = data.locker_usage.map(item => item.count);
                
                new Chart(ctxLocker, {
                    type: 'bar',
                    data: {
                        labels: lockerLabels,
                        datasets: [{
                            label: 'Total Uses',
                            data: lockerData,
                            backgroundColor: 'rgba(76, 175, 80, 0.6)',
                            borderColor: 'rgba(76, 175, 80, 1)',
                            borderWidth: 1
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: { beginAtZero: true, ticks: { color: '#ccc' } },
                            x: { ticks: { color: '#ccc' } }
                        },
                        plugins: {
                            legend: { labels: { color: '#fff' } }
                        }
                    }
                });

                // 2. Render Peak Days Chart (Line or Polar Area)
                const ctxDays = document.getElementById('peakDaysChart').getContext('2d');
                const daysLabels = data.peak_days.map(item => item.day);
                const daysData = data.peak_days.map(item => item.count);
                
                new Chart(ctxDays, {
                    type: 'line',
                    data: {
                        labels: daysLabels,
                        datasets: [{
                            label: 'Number of Requests',
                            data: daysData,
                            fill: true,
                            backgroundColor: 'rgba(33, 150, 243, 0.2)',
                            borderColor: 'rgba(33, 150, 243, 1)',
                            tension: 0.3,
                            borderWidth: 2,
                            pointBackgroundColor: '#fff'
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: { beginAtZero: true, ticks: { color: '#ccc' } },
                            x: { ticks: { color: '#ccc' } }
                        },
                        plugins: {
                            legend: { labels: { color: '#fff' } }
                        }
                    }
                });
            } catch (err) {
                console.error("Failed to load statistics:", err);
            }
        }
        
        // Ensure adminName is Administrator
        const checkAdmin = localStorage.getItem('adminName');
        if (checkAdmin !== 'Administrator') {
            alert('Access Denied: Master Role Required.');
            window.location.href = 'dashboard.html';
        } else {
            // Load stats when the page loads
            document.addEventListener('DOMContentLoaded', loadStatistics);
        }
    </script>
</body>
</html>
