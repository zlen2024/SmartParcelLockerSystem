# fly.toml app configuration file generated for pick-n-go-locker on 2026-06-21T07:45:02Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'pick-n-go-locker'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATABASE_URL = 'sqlite:////data/pickngo_v2.db'

[[mounts]]
  source = 'pickngo_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
